# ============================================================
# YourTeacher 本番環境用 docker-compose
# さくらVPS での運用を想定
#
# 使い方:
#   docker compose -f docker-compose.prod.yml up -d
# ============================================================

services:
  nginx:
    image: nginx:alpine
    container_name: yt_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro   # 管理者画面（/admin）のBasic認証用
      - /etc/letsencrypt:/etc/letsencrypt:ro   # Certbot証明書（oshi-english.life）
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod              # 本番用Dockerfile（next build）
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
    container_name: yt_frontend
    env_file: .env
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod              # 本番用Dockerfile（--reloadなし）
    container_name: yt_backend
    env_file: .env
    # 本番ではボリュームマウントしない（コードはビルド時に固定）
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

  db:
    image: mysql:8
    container_name: yt_db
    env_file: .env
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
      - ./mysql/backup:/backup              # バックアップ出力先
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "yt_user", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:alpine
    container_name: yt_redis
    volumes:
      - redis_data:/data
    restart: always

volumes:
  mysql_data:
  redis_data:
