# ============================================================
# YourTeacher 本番用 Nginx設定
# ドメイン: oshi-english.life
# SSL: Let's Encrypt（certbot certonly --standalone で取得した証明書を使用）
# ============================================================

# HTTP -> HTTPS リダイレクト
server {
    listen 80;
    server_name oshi-english.life www.oshi-english.life;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name oshi-english.life www.oshi-english.life;

    ssl_certificate /etc/letsencrypt/live/oshi-english.life/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oshi-english.life/privkey.pem;

    # DockerのDNSリゾルバを使用（コンテナ再起動時のIP変更に対応）
    resolver 127.0.0.11 valid=10s ipv6=off;

    # バックエンドAPI（先に書くことで /api/ を優先マッチ）
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # フロントエンド
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
